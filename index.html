    let conversations = [];

    let isDeepThinking = false;   // وضع التفكير العميق يعطي إجابات أطول وأعمق
    
    // Helper functions
    function genId() {
        return Date.now() + '-' + Math.random().toString(36).substr(2, 8);
    }

    function saveToLocal() {
        const data = {
            conversations: conversations,
            activeId: activeConversationId,
            deepMode: isDeepThinking
        };
        localStorage.setItem('deepcode_data', JSON.stringify(data));
    }

    function loadFromLocal() {
        const raw = localStorage.getItem('deepcode_data');
        if (!raw) {
            const defaultConv = {
                id: genId(),
                title: "المحادثة الرئيسية",
                messages: [
                    { role: "bot", content: "✨ أنا ذكاء اصطناعي مبرمج، أستطيع كتابة أي كود وأداة. جرب تطلب بوت ديسكورد أو أداة بايثون متقدمة!" }
                ]
            };
            conversations = [defaultConv];
            activeConversationId = defaultConv.id;
            isDeepThinking = false;
            saveToLocal();
            return;
        }
        try {
            const data = JSON.parse(raw);
            conversations = data.conversations || [];
            activeConversationId = data.activeId || (conversations[0]?.id || null);
            isDeepThinking = data.deepMode || false;
            if (conversations.length === 0) {
                const newC = { id: genId(), title: "بداية جديدة", messages: [{ role: "bot", content: "أهلاً! اطلب أي برمجة." }] };
                conversations.push(newC);
                activeConversationId = newC.id;
                saveToLocal();
            }
        } catch(e) { console.error(e); }
        updateDeepButtonUI();
    }

    function updateDeepButtonUI() {
        const btn = document.getElementById('deepThinkBtn');
        if (btn) {
            if (isDeepThinking) {
                btn.classList.add('active');
                btn.innerHTML = '<i class="fas fa-brain"></i> تفكير عميق (نشط)';
            } else {
                btn.classList.remove('active');
                btn.innerHTML = '<i class="fas fa-microchip"></i> تفكير عميق';
            }
        }
    }

    function getActiveConv() {
        return conversations.find(c => c.id === activeConversationId);
    }

    function addMessageToActive(role, content) {
        const conv = getActiveConv();
        if (conv) {
            conv.messages.push({ role, content });
            saveToLocal();
            renderCurrentMessages();
        }
    }

            conv.title = newTitle;
            saveToLocal();
            renderConversationsList();
        }
    }

            const bubble = document.createElement('div');
            bubble.className = 'msg-bubble';
            let content = msg.content;
            content = content.replace(/```(\w*)\n([\s\S]*?)```/g, (match, lang, code) => {
                return `<pre><code class="language-${lang || 'python'}">${escapeHtml(code)}</code></pre>`;
            });
            content = content.replace(/`([^`]+)`/g, '<code>$1</code>');
            content = content.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
            content = content.replace(/\n/g, '<br>');
            bubble.innerHTML = content;
            msgDiv.appendChild(bubble);
            container.appendChild(msgDiv);
        });
        container.scrollTop = container.scrollHeight;
        document.querySelectorAll('pre code').forEach(block => hljs.highlightElement(block));
    }

    function escapeHtml(str) {
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    function renderConversationsList() {
        const container = document.getElementById('conversationsList');
        if (!container) return;
        container.innerHTML = '';
        conversations.forEach(conv => {
            const div = document.createElement('div');
            div.className = 'conv-item';
            if (conv.id === activeConversationId) div.classList.add('active');
            const titleSpan = document.createElement('span');
            titleSpan.className = 'conv-title';
            titleSpan.innerText = conv.title.length > 22 ? conv.title.slice(0, 20) + '...' : conv.title;
            const delBtn = document.createElement('button');
            delBtn.className = 'delete-conv';
            delBtn.innerHTML = '<i class="fas fa-trash-alt"></i>';
            delBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                deleteConversation(conv.id);
            });
            div.appendChild(titleSpan);
            div.appendChild(delBtn);
            div.addEventListener('click', () => {
                activeConversationId = conv.id;
                saveToLocal();
                renderConversationsList();
                renderCurrentMessages();
                if (window.innerWidth <= 768) document.getElementById('sidebar').classList.remove('open');
            });
            container.appendChild(div);
        });
    }

    function deleteConversation(id) {
        if (conversations.length === 1) {
            createNewConversation();
            const idx = conversations.findIndex(c => c.id === id);
            if (idx !== -1) conversations.splice(idx, 1);
            activeConversationId = conversations[0].id;
            saveToLocal();
            renderConversationsList();
            renderCurrentMessages();
            return;
        }
        const idx = conversations.findIndex(c => c.id === id);
        if (idx !== -1) {
            conversations.splice(idx, 1);
            if (activeConversationId === id) activeConversationId = conversations[0].id;
            saveToLocal();
            renderConversationsList();
            renderCurrentMessages();
        }
    }

    function createNewConversation() {
        const newId = genId();
        const newConv = {
            id: newId,
            title: `محادثة ${new Date().toLocaleTimeString()}`,
            messages: [{ role: "bot", content: "✨ محادثة جديدة! أنا جاهز لكتابة أي كود أو أداة برمجية." }]
        };
        conversations.unshift(newConv);
        activeConversationId = newId;
        saveToLocal();
        renderConversationsList();
        renderCurrentMessages();
    }

    async function handleSend() {
        const input = document.getElementById('promptInput');
        const text = input.value.trim();
        if (!text) return;
        addMessageToActive('user', text);
        const conv = getActiveConv();
        updateConvTitle(conv, text);
        input.value = '';
        input.style.height = 'auto';

        // إظهار مؤشر الكتابة
        const container = document.getElementById('messagesContainer');
        const typingDiv = document.createElement('div');
        typingDiv.className = 'message bot';
        typingDiv.innerHTML = `<div class="msg-bubble"><div class="typing-indicator"><span></span><span></span><span></span></div> جاري التفكير والبرمجة...</div>`;
        container.appendChild(typingDiv);
        container.scrollTop = container.scrollHeight;

        const aiMsg = await generateAIResponse(text, isDeepThinking);
        container.removeChild(typingDiv);
        addMessageToActive('bot', aiMsg);
    }

    // Events
    document.getElementById('sendBtn').addEventListener('click', handleSend);
    document.getElementById('promptInput').addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            handleSend();
        }
    });
    document.getElementById('newChatBtn').addEventListener('click', () => {
        createNewConversation();
        if (window.innerWidth <= 768) document.getElementById('sidebar').classList.remove('open');
    });
    document.getElementById('hamburgerIcon').addEventListener('click', () => {
        document.getElementById('sidebar').classList.toggle('open');
    });
    document.getElementById('deepThinkBtn').addEventListener('click', () => {
        isDeepThinking = !isDeepThinking;
        saveToLocal();
        updateDeepButtonUI();
        const status = isDeepThinking ? "تم تفعيل التفكير العميق ✅" : "تم إلغاء التفكير العميق ❌";
        const tempMsg = document.createElement('div');
        tempMsg.className = 'message bot';
        tempMsg.innerHTML = `<div class="msg-bubble"><i class="fas fa-info-circle"></i> ${status}</div>`;
        document.getElementById('messagesContainer').appendChild(tempMsg);
        setTimeout(() => tempMsg.remove(), 2000);
    });

    loadFromLocal();
    renderConversationsList();
    renderCurrentMessages();
    updateDeepButtonUI();
</script>
</body>
</html>
